model:
  _target_: src.destriping.GLUM.glum_wrapper.GlumWrapper

model_name: GlumWrapper

model_args:
  id_label: ${..dataset.cell_id_label}
  init_method: "ones"
  init_method_args: 
    c_mean: true
  family: "nbinom"
  family_params: 
    theta: 1.0
  n_alphas: 10
  alphas: null
  P2: "hw_only"
  cv_split_method: "default"
  freeze_c: false
  regressorCV: false
  sklearnCV: true
  sklearnCV_one_SE_rule: false
  warm_start_alpha: true
  fit_theta_iter: true
  fit_theta_max_iter: 5
  fit_theta_iter_loc: "out"
  selection: "random"
  solver: "lbfgs"
  max_iter: 100000
  parallel: false