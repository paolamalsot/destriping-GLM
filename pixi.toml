[workspace]
name = "glum_env_pixi"
channels = ["https://repo.prefix.dev/glum","https://prefix.dev/conda-forge"]
preview = ["pixi-build"]
platforms = ["osx-arm64","linux-64"]

[dependencies]
python = "3.11.*"
tabmat = { version = "4.1.2.post16.*", channel = "https://repo.prefix.dev/glum" }
xsimd = "*"
jemalloc = "*"
cython = "*"
glum = "3.1.2.*"
dask-ml = "*"
ipykernel = ">=6.31.0,<7"
matplotlib = "*"
seaborn = "*"
plotly = ">=6.3.1,<7"
nbformat = ">=5.10.4,<6"
scanpy = "1.10.2.*"
stardist = "0.9.1.*"
setuptools = "<81"  # bioimageio.core uses pkg_resources, removed in setuptools>=81
opencv = "4.10.*"
dash = "2.18.2.*"
submitit = "1.5.2.*"
line_profiler = "4.1.3.*"
omegaconf = "2.3.0.*"
anndata = "==0.10.8"
pandas = "<3"
gsl = ">=2.8,<3"
tqdm = ">=4.67.1,<5"
snakeviz = ">=2.2.2,<3"
adjusttext = ">=1.3.0,<2"
cmap = ">=0.6.2,<0.7"

[pypi-dependencies]
jupyterlab-execute-time = ">=3.2.0, <4"
celltypist = "==1.6.3"
hydra-core = "==1.3.2"
xxhash = ">=3.6.0, <4"
hydra-submitit-launcher = ">=1.2.0, <2"
textalloc = ">=1.2.1, <2"
brokenaxes = ">=0.6.2, <0.7"
brainglobe-atlasapi = ">=2.0.0, <3"
scikit-posthocs = ">=0.12.0, <0.13"
ipympl = ">=0.9, <1"

[environments]
default = { features = [], no-default-feature = false }
